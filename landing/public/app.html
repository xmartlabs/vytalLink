<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Download VytalLink</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link type="text/plain" rel="llms" href="/llms.txt" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --text: #0f172a;
        --text-muted: #64748b;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(ellipse at 60% 0%, rgba(99, 102, 241, 0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 0% 80%, rgba(79, 70, 229, 0.1) 0%, transparent 45%),
          linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      }

      /* ── Header ── */
      .app-header {
        padding: 1.25rem 1.75rem;
        flex-shrink: 0;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
        color: var(--text);
      }

      .logo i {
        font-size: 1.15rem;
        color: var(--primary);
      }

      .logo-name {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      /* ── Body ── */
      .app-body {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 1rem 1.5rem 3rem;
      }

      main {
        width: min(22rem, 100%);
        text-align: center;
      }

      /* ── App icon ── */
      .app-icon {
        width: 80px;
        height: 80px;
        border-radius: 22px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
      }

      .app-icon i {
        font-size: 2rem;
        color: white;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.025em;
      }

      .subtitle {
        margin: 0 0 2.25rem;
        font-size: 0.92rem;
        color: var(--text-muted);
        line-height: 1.55;
      }

      /* ── Store buttons ── */
      .store-buttons {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }

      .store-btn {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        padding: 1rem 1.4rem;
        border-radius: 1rem;
        text-decoration: none;
        transition: transform 0.15s, box-shadow 0.15s;
        border: 1px solid transparent;
      }

      .store-btn:hover {
        transform: translateY(-2px);
      }

      .store-btn:active {
        transform: scale(0.98);
      }

      .store-btn--apple {
        background: var(--text);
        color: #fff;
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.25);
      }

      .store-btn--apple:hover {
        box-shadow: 0 6px 20px rgba(15, 23, 42, 0.32);
      }

      .store-btn--google {
        background: #fff;
        color: var(--text);
        border-color: #e2e8f0;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
      }

      .store-btn--google:hover {
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.13);
        border-color: #c7d2e0;
      }

      .store-btn-icon {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .store-btn-icon svg {
        width: 26px;
        height: 26px;
      }

      .store-btn-text {
        display: flex;
        flex-direction: column;
        text-align: left;
      }

      .store-btn-label {
        font-size: 0.67rem;
        font-weight: 400;
        opacity: 0.65;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        line-height: 1;
        margin-bottom: 0.2rem;
      }

      .store-btn-name {
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        line-height: 1;
      }

      /* ── Footer link ── */
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--text-muted);
        font-size: 0.82rem;
        text-decoration: none;
        transition: color 0.15s;
      }

      .back-link:hover {
        color: var(--primary);
      }

      .back-link i {
        font-size: 0.7rem;
      }
    </style>
  <script>
    const PLAY_URL = "https://play.google.com/store/apps/details?id=com.xmartlabs.vytallink";
    const APP_STORE_URL = "https://apps.apple.com/app/id6752308627";

    const ua = navigator.userAgent || "";
    const isAndroid = /Android/i.test(ua);
    const isClassicIOS = /iPhone|iPad|iPod/i.test(ua);
    const isIPadDesktopLike = /Macintosh;.*Mac OS X/i.test(ua) && /Mobile\/[0-9A-Za-z]+/i.test(ua);
    const isIOS = isClassicIOS || isIPadDesktopLike;

    if (isAndroid) window.location.replace(PLAY_URL);
    else if (isIOS) window.location.replace(APP_STORE_URL);
  </script>
  </head>
  <body>
    <header class="app-header">
      <a class="logo" href="/">
        <i class="fas fa-heartbeat"></i>
        <span class="logo-name">vytalLink</span>
      </a>
    </header>

    <div class="app-body">
      <main>
        <div class="app-icon">
          <i class="fas fa-heartbeat"></i>
        </div>

        <h1>Download VytalLink</h1>
        <p class="subtitle">Connect your wearable data to your AI agent.</p>

        <div class="store-buttons">
          <a class="store-btn store-btn--apple" href="https://apps.apple.com/app/id6752308627">
            <span class="store-btn-icon">
              <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
              </svg>
            </span>
            <span class="store-btn-text">
              <span class="store-btn-label">Download on the</span>
              <span class="store-btn-name">App Store</span>
            </span>
          </a>

          <a class="store-btn store-btn--google" href="https://play.google.com/store/apps/details?id=com.xmartlabs.vytallink">
            <span class="store-btn-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.18 23.76c.3.17.64.24.99.2L15.34 12 11.65 8.3 3.18 23.76z" fill="#EA4335"/>
                <path d="M20.93 10.6L18.1 9l-3.09 3 3.09 3.1 2.86-1.6c.81-.46.81-1.44-.03-1.9z" fill="#FBBC04"/>
                <path d="M4.17.24C3.82.2 3.48.27 3.18.44L11.65 12 15.34 8.3 4.17.24z" fill="#4285F4"/>
                <path d="M3.18.44C2.4.88 1.93 1.76 1.93 2.91v18.18c0 1.15.47 2.03 1.25 2.47L12.5 12 3.18.44z" fill="#34A853"/>
              </svg>
            </span>
            <span class="store-btn-text">
              <span class="store-btn-label">Get it on</span>
              <span class="store-btn-name">Google Play</span>
            </span>
          </a>
        </div>

        <a class="back-link" href="/">
          <i class="fas fa-arrow-left"></i> Back to vytallink.xmartlabs.com
        </a>
      </main>
    </div>
  </body>
</html>
